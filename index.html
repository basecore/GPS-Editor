<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Track Editor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <!-- Leaflet, Chart.js, PapaParse & html2canvas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* Grundlayout - Natürliches Scrollen für mobile Geräte */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f9; color: #333; }
        
        .container { padding: 10px; display: flex; flex-direction: column; gap: 12px; max-width: 800px; margin: 0 auto; min-height: 100vh; }

        /* Lade-Overlay */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #007bff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI Elemente */
        .row { display: flex; gap: 10px; align-items: center; width: 100%; }
        select, input[type="file"], .btn { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; width: 100%; background: #fff; }
        input[type="file"] { display: none; }
        
        .btn { border: none; font-weight: bold; text-align: center; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-upload { background: #2c3e50; }
        .btn-export { background: #007bff; font-size: 15px; }
        .btn-screenshot { background: #6f42c1; font-size: 15px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        /* Capture Area (Dieser Bereich wird als Bild exportiert) */
        #capture-area { background: #f4f4f9; display: flex; flex-direction: column; gap: 12px; padding: 5px; border-radius: 8px; }

        /* Map Bereich */
        #map-container { height: 45vh; min-height: 350px; position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #ccc; z-index: 1; }
        #map { width: 100%; height: 100%; }
        
        .legend { position: absolute; bottom: 15px; left: 10px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 8px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 11px; pointer-events: none; }
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; margin-right: 8px; }

        /* Floating Time Controls (Schwebend auf der Karte) */
        .floating-time-controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 8px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 6px; max-width: 220px; }
        .time-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
        .time-label { font-weight: bold; font-size: 12px; width: 35px; }
        input[type="time"] { padding: 4px; font-size: 13px; flex-grow: 1; border: 1px solid #aaa; border-radius: 4px; }
        .btn-adjust { padding: 4px 6px; font-size: 11px; border-radius: 4px; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: #28a745; }
        .btn-end { background: #dc3545; }
        .btn-gray { background: #6c757d; width: 100%; margin-top: 2px; }

        /* Chart Area */
        .chart-container { width: 100%; height: 180px; position: relative; background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 5px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-value { font-weight: bold; font-size: 1.1em; color: #2c3e50; }
        .stat-label { color: #666; font-size: 0.8em; text-transform: uppercase; }

        .footer { text-align: center; font-size: 11px; color: #888; padding: 10px 0; margin-top: auto; }
        .footer a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <!-- Ladebildschirm -->
    <div id="loader">
        <div class="spinner"></div>
        <strong style="color:#2c3e50; font-size:18px;">Lese GPS-Daten...</strong>
        <span style="color:#666; font-size:14px; margin-top:5px;">Dies kann einige Sekunden dauern</span>
    </div>

    <div class="container">
        
        <!-- Header (Wird nicht gedruckt/exportiert) -->
        <div class="row no-print">
            <label class="btn btn-upload" style="flex: 1;">
                📁 CSV/GPX laden
                <input type="file" id="fileInput" accept=".gpx,.kml,.csv">
            </label>
            <select id="dateSelect" style="flex: 1;" disabled>
                <option>Keine Daten</option>
            </select>
        </div>

        <!-- BEREICH FÜR DEN BILD-EXPORT -->
        <div id="capture-area">
            
            <div id="map-container">
                <div id="map"></div>
                
                <div class="legend">
                    <div class="legend-item"><div class="legend-color" style="background:#28a745;"></div> Gehen (&lt;7 km/h)</div>
                    <div class="legend-item"><div class="legend-color" style="background:#fd7e14;"></div> Joggen (7-15 km/h)</div>
                    <div class="legend-item"><div class="legend-color" style="background:#6f42c1;"></div> Rad (15-30 km/h)</div>
                    <div class="legend-item"><div class="legend-color" style="background:#dc3545;"></div> Auto (&gt;30 km/h)</div>
                </div>

                <!-- Kontrollen schweben auf der Karte -->
                <div class="floating-time-controls">
                    <div class="time-row">
                        <span class="time-label" style="color:#28a745">Start:</span>
                        <button class="btn-adjust btn-start" onclick="adjustTime('start', -1)">-1m</button>
                        <input type="time" id="timeStart" step="1" disabled onchange="manualTimeInput('start')">
                        <button class="btn-adjust btn-start" onclick="adjustTime('start', 1)">+1m</button>
                    </div>
                    <div class="time-row">
                        <span class="time-label" style="color:#dc3545">Ende:</span>
                        <button class="btn-adjust btn-end" onclick="adjustTime('end', -1)">-1m</button>
                        <input type="time" id="timeEnd" step="1" disabled onchange="manualTimeInput('end')">
                        <button class="btn-adjust btn-end" onclick="adjustTime('end', 1)">+1m</button>
                    </div>
                    <button class="btn-adjust btn-gray" onclick="resetSelection()">↺ Gesamten Tag anzeigen</button>
                </div>
            </div>

            <!-- Diagramm -->
            <div class="chart-container">
                <canvas id="profileChart"></canvas>
            </div>

            <!-- Statistiken -->
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-label">Datum</span><span class="stat-value" id="stDate">-</span></div>
                <div class="stat-box"><span class="stat-label">Aktivität</span><span class="stat-value" id="stActivity">-</span></div>
                <div class="stat-box"><span class="stat-label">Distanz</span><span class="stat-value" id="stDist">- km</span></div>
                
                <div class="stat-box"><span class="stat-label">Dauer</span><span class="stat-value" id="stTime">- min</span></div>
                <div class="stat-box"><span class="stat-label">Ø Speed</span><span class="stat-value" id="stAvgSpd">- km/h</span></div>
                <div class="stat-box"><span class="stat-label">Max Speed</span><span class="stat-value" id="stMaxSpd">- km/h</span></div>
                
                <div class="stat-box"><span class="stat-label">Aufstieg</span><span class="stat-value" id="stEleUp" style="color:#28a745">- m</span></div>
                <div class="stat-box"><span class="stat-label">Abstieg</span><span class="stat-value" id="stEleDown" style="color:#dc3545">- m</span></div>
                <div class="stat-box"><span class="stat-label">Ø Höhe</span><span class="stat-value" id="stEleAvg">- m</span></div>
            </div>
        </div>
        <!-- ENDE CAPTURE AREA -->

        <!-- Export Buttons (Wird nicht gedruckt) -->
        <div class="row no-print" style="margin-top: 5px;">
            <button id="exportBtn" class="btn btn-export" disabled>💾 GPX Export</button>
            <button id="screenshotBtn" class="btn btn-screenshot" disabled>📸 PNG Bild</button>
        </div>
        
        <div class="footer no-print">
            GPS Editor Pro <b>v1.4.0</b> | © 2026 Basecore | <a href="https://github.com/basecore/GPS-Editor" target="_blank">GitHub Projekt</a>
        </div>
    </div>

    <script>
        // --- MAP SETUP (WICHTIG: crossOrigin: true für Screenshot-Funktion!) ---
        const map = L.map('map').setView([48.1351, 11.5820], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '© OSMap',
            crossOrigin: true 
        }).addTo(map);

        let globalPointsByDate = {};
        let currentDayPoints = [];
        let trackLayerGroup = L.layerGroup().addTo(map);
        let chartCursorMarker = null;
        let mapClickMarker = null;
        let chartInstance = null;
        
        let selStartIdx = 0;
        let selEndIdx = 0;

        const loader = document.getElementById('loader');
        const dateSelect = document.getElementById('dateSelect');
        const exportBtn = document.getElementById('exportBtn');
        const screenshotBtn = document.getElementById('screenshotBtn');
        const timeStart = document.getElementById('timeStart');
        const timeEnd = document.getElementById('timeEnd');

        // --- HELPER ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3, p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            return R * 2 * Math.atan2(Math.sqrt(Math.sin(dp/2)**2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2)**2), Math.sqrt(1-(Math.sin(dp/2)**2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2)**2)));
        }
        
        function formatTimeForInput(isoStr) {
            return new Date(isoStr).toTimeString().split(' ')[0]; // HH:MM:SS
        }
        
        function formatDateGerman(isoStr) {
            return new Date(isoStr).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // --- MAP CLICK HANDLER ---
        map.on('click', function(e) {
            if(currentDayPoints.length === 0) return;
            
            let closestIdx = -1, minDist = Infinity;
            currentDayPoints.forEach((p, idx) => {
                let dist = e.latlng.distanceTo([p.lat, p.lon]);
                if(dist < minDist) { minDist = dist; closestIdx = idx; }
            });

            if(minDist < 150 && closestIdx !== -1) { 
                if(mapClickMarker) map.removeLayer(mapClickMarker);
                
                let pt = currentDayPoints[closestIdx];
                let speedKmh = pt.speedKmh ? pt.speedKmh.toFixed(1) : '-';

                mapClickMarker = L.circleMarker([pt.lat, pt.lon], { color: '#000', fillColor: '#fff', fillOpacity: 1, radius: 7, weight: 3 }).addTo(map);

                let popupContent = `
                    <div style="font-size:13px; margin-bottom:6px; line-height:1.4;">
                        <b>Zeit:</b> ${formatTimeForInput(pt.time)}<br>
                        <b>Geschw.:</b> ${speedKmh} km/h
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-adjust btn-start" onclick="applyIndex('start', ${closestIdx})">Als Start</button>
                        <button class="btn-adjust btn-end" onclick="applyIndex('end', ${closestIdx})">Als Ende</button>
                    </div>
                `;
                mapClickMarker.bindPopup(popupContent).openPopup();
            }
        });

        // --- DATA PROCESSING ---
        function processAllPoints(points) {
            globalPointsByDate = {};
            points.forEach(p => {
                let d = new Date(p.time);
                if (isNaN(d.getTime())) return;
                let dateStr = d.toISOString().split('T')[0];
                if (!globalPointsByDate[dateStr]) globalPointsByDate[dateStr] = [];
                globalPointsByDate[dateStr].push(p);
            });

            let dates = Object.keys(globalPointsByDate).sort();
            dateSelect.innerHTML = '';
            if (dates.length === 0) { alert("Keine gültigen GPS Daten gefunden"); loader.style.display = 'none'; return; }

            dates.forEach(d => {
                let opt = document.createElement('option'); opt.value = d;
                opt.text = new Date(d).toLocaleDateString('de-DE', { weekday: 'short', month: '2-digit', day: '2-digit', year: 'numeric' }) + ` (${globalPointsByDate[d].length} Pkt)`;
                dateSelect.appendChild(opt);
            });

            dateSelect.disabled = false;
            loadDay(dates[0]); // Lädt direkt den ersten Tag
        }

        // *** HIER IST DER BUGFIX: Event Listener für das Dropdown-Menü ***
        dateSelect.addEventListener('change', (e) => {
            loadDay(e.target.value);
        });

        function loadDay(dateString) {
            loader.style.display = 'flex'; // Spinner an
            
            // Alte Marker aufräumen, falls man den Tag wechselt
            if(chartCursorMarker) { map.removeLayer(chartCursorMarker); chartCursorMarker = null; }
            if(mapClickMarker) { map.removeLayer(mapClickMarker); mapClickMarker = null; }
            
            setTimeout(() => {
                currentDayPoints = globalPointsByDate[dateString].sort((a,b) => new Date(a.time) - new Date(b.time));
                
                let totalDist = 0;
                for(let i = 0; i < currentDayPoints.length; i++) {
                    let p = currentDayPoints[i];
                    if(i > 0) {
                        let prev = currentDayPoints[i-1];
                        let d = getDistance(prev.lat, prev.lon, p.lat, p.lon) / 1000;
                        totalDist += d;
                        let hrs = (new Date(p.time) - new Date(prev.time)) / 3600000;
                        p.speedKmh = (p.csvSpeed > 0) ? p.csvSpeed * 3.6 : (hrs > 0 ? d / hrs : 0);
                    } else {
                        p.speedKmh = 0;
                    }
                    p.cumDist = totalDist; 
                }

                resetSelection();
                loader.style.display = 'none'; 
            }, 100);
        }

        // --- UPDATE VIEW & CHART ---
        function updateView() {
            timeStart.value = formatTimeForInput(currentDayPoints[selStartIdx].time);
            timeEnd.value = formatTimeForInput(currentDayPoints[selEndIdx].time);
            timeStart.disabled = false;
            timeEnd.disabled = false;
            
            drawMapTrack();
            updateChart();
            analyzeSelection(currentDayPoints.slice(selStartIdx, selEndIdx + 1));
            
            let bounds = L.latLngBounds(currentDayPoints.slice(selStartIdx, selEndIdx + 1).map(p => [p.lat, p.lon]));
            map.fitBounds(bounds, {padding: [20, 20]});
        }

        function drawMapTrack() {
            trackLayerGroup.clearLayers();
            let currentCoords = [], currentColor = null, currentSelected = null;

            for(let i = 1; i < currentDayPoints.length; i++) {
                let p1 = currentDayPoints[i-1], p2 = currentDayPoints[i];
                let isSelected = (i >= selStartIdx && i <= selEndIdx);
                
                let color = '#28a745'; 
                if(p2.speedKmh > 30) color = '#dc3545'; else if(p2.speedKmh > 15) color = '#6f42c1'; else if(p2.speedKmh > 7) color = '#fd7e14';

                if(color !== currentColor || isSelected !== currentSelected) {
                    if(currentCoords.length > 0) {
                        L.polyline(currentCoords, { color: currentColor, weight: currentSelected ? 6 : 3, opacity: currentSelected ? 1.0 : 0.3 }).addTo(trackLayerGroup);
                    }
                    currentCoords = [[p1.lat, p1.lon], [p2.lat, p2.lon]];
                    currentColor = color; currentSelected = isSelected;
                } else { currentCoords.push([p2.lat, p2.lon]); }
            }
            if(currentCoords.length > 0) L.polyline(currentCoords, { color: currentColor, weight: currentSelected ? 6 : 3, opacity: currentSelected ? 1.0 : 0.3 }).addTo(trackLayerGroup);
            
            L.circleMarker([currentDayPoints[selStartIdx].lat, currentDayPoints[selStartIdx].lon], {color: '#28a745', radius: 6, fillOpacity: 1}).addTo(trackLayerGroup);
            L.circleMarker([currentDayPoints[selEndIdx].lat, currentDayPoints[selEndIdx].lon], {color: '#dc3545', radius: 6, fillOpacity: 1}).addTo(trackLayerGroup);
        }

        function updateChart() {
            const ctx = document.getElementById('profileChart').getContext('2d');
            let slicedPoints = currentDayPoints.slice(selStartIdx, selEndIdx + 1);
            
            let startDist = slicedPoints[0].cumDist;
            let labels = slicedPoints.map(p => (p.cumDist - startDist).toFixed(2) + ' km');
            
            let eleData = slicedPoints.map(p => p.ele);
            let speedData = slicedPoints.map(p => p.speedKmh > 100 ? null : p.speedKmh);

            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Speed (km/h)', data: speedData, yAxisID: 'ySpeed', borderColor: '#007bff', backgroundColor: 'rgba(0, 123, 255, 0.2)', fill: true, tension: 0.2, pointRadius: 0, borderWidth: 2, order: 1 },
                        { label: 'Höhe (m)', data: eleData, yAxisID: 'yEle', borderColor: '#6c757d', backgroundColor: 'rgba(108, 117, 125, 0.2)', fill: true, tension: 0.1, pointRadius: 0, borderWidth: 1, order: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, font: {size: 10} } } },
                    scales: {
                        x: { ticks: { maxTicksLimit: 5, font: {size: 10} } },
                        ySpeed: { type: 'linear', position: 'left', title: {display: true, text: 'Speed (km/h)', font: {size: 10}, color: '#007bff'}, ticks: {font: {size: 10}, color: '#007bff'} },
                        yEle: { type: 'linear', position: 'right', grid: {drawOnChartArea: false}, title: {display: true, text: 'Höhe (m)', font: {size: 10}, color: '#6c757d'}, ticks: {font: {size: 10}, color: '#6c757d'} }
                    },
                    onHover: (e, activeEls) => {
                        if (activeEls.length > 0) {
                            let localIdx = activeEls[0].index;
                            let globalIdx = selStartIdx + localIdx;
                            let pt = currentDayPoints[globalIdx];
                            
                            if(!chartCursorMarker) chartCursorMarker = L.circleMarker([pt.lat, pt.lon], {color: 'black', fillColor: 'white', fillOpacity: 1, radius: 7, weight: 3}).addTo(map);
                            else chartCursorMarker.setLatLng([pt.lat, pt.lon]);
                        }
                    }
                }
            });
        }

        // --- ZEITSTEUERUNG UND MANUELLE EINGABE ---
        window.applyIndex = function(type, idx) {
            if(type === 'start') { if(idx > selEndIdx) selEndIdx = idx; selStartIdx = idx; }
            if(type === 'end') { if(idx < selStartIdx) selStartIdx = idx; selEndIdx = idx; }
            if(mapClickMarker) map.closePopup();
            updateView();
        };

        window.adjustTime = function(type, minutes) {
            let targetIdx = type === 'start' ? selStartIdx : selEndIdx;
            let targetTime = new Date(currentDayPoints[targetIdx].time).getTime() + (minutes * 60000);
            
            let closestIdx = targetIdx, minDiff = Infinity;
            currentDayPoints.forEach((p, idx) => {
                let diff = Math.abs(new Date(p.time).getTime() - targetTime);
                if(diff < minDiff) { minDiff = diff; closestIdx = idx; }
            });
            applyIndex(type, closestIdx);
        };

        window.manualTimeInput = function(type) {
            let inputStr = type === 'start' ? timeStart.value : timeEnd.value;
            let targetTimeOfDay = parseInt(inputStr.split(':')[0])*3600 + parseInt(inputStr.split(':')[1])*60 + parseInt(inputStr.split(':')[2]||0);
            
            let closestIdx = type === 'start' ? selStartIdx : selEndIdx, minDiff = Infinity;
            currentDayPoints.forEach((p, idx) => {
                let pTime = new Date(p.time);
                let pTimeOfDay = pTime.getHours()*3600 + pTime.getMinutes()*60 + pTime.getSeconds();
                let diff = Math.abs(pTimeOfDay - targetTimeOfDay);
                if(diff < minDiff) { minDiff = diff; closestIdx = idx; }
            });
            applyIndex(type, closestIdx);
        }

        window.resetSelection = function() {
            selStartIdx = 0;
            selEndIdx = currentDayPoints.length - 1;
            exportBtn.disabled = false;
            screenshotBtn.disabled = false;
            updateView();
        };

        function analyzeSelection(points) {
            if(points.length < 2) return;
            let totalDist = 0, eleUp = 0, eleDown = 0, maxSpeed = 0, sumEle = 0, validEleCount = 0;
            let durationMin = (new Date(points[points.length-1].time) - new Date(points[0].time)) / 60000;

            for(let i=0; i<points.length; i++) {
                if(i > 0) {
                    totalDist += getDistance(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon) / 1000;
                    if(points[i].ele && points[i-1].ele) {
                        let diff = points[i].ele - points[i-1].ele;
                        if(diff > 0) eleUp += diff; else eleDown += Math.abs(diff);
                    }
                }
                if(points[i].speedKmh > maxSpeed && points[i].speedKmh < 100) maxSpeed = points[i].speedKmh;
                if(points[i].ele) { sumEle += points[i].ele; validEleCount++; }
            }

            let avgKmh = durationMin > 0 ? totalDist / (durationMin / 60) : 0;
            let act = "Gehen"; if(avgKmh>7) act="Joggen"; if(avgKmh>15) act="Rad"; if(avgKmh>30) act="Auto";

            document.getElementById('stDate').innerText = formatDateGerman(points[0].time);
            document.getElementById('stActivity').innerText = act;
            document.getElementById('stDist').innerText = totalDist.toFixed(2) + ' km';
            document.getElementById('stTime').innerText = durationMin.toFixed(0) + ' min';
            document.getElementById('stAvgSpd').innerText = avgKmh.toFixed(1) + ' km/h';
            document.getElementById('stMaxSpd').innerText = maxSpeed.toFixed(1) + ' km/h';
            document.getElementById('stEleUp').innerText = eleUp.toFixed(0) + ' m';
            document.getElementById('stEleDown').innerText = eleDown.toFixed(0) + ' m';
            document.getElementById('stEleAvg').innerText = validEleCount > 0 ? (sumEle/validEleCount).toFixed(0) + ' m' : '-';
        }

        // --- FILE INPUT ---
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const f = e.target.files[0]; if(!f) return;
            loader.style.display = 'flex'; 
            
            const r = new FileReader();
            r.onload = function(evt) {
                const name = f.name.toLowerCase();
                if(name.endsWith('.csv')) {
                    Papa.parse(evt.target.result, { header: true, skipEmptyLines: true, complete: function(res) {
                        let pts = res.data.filter(row => row.lat && row.lon).map(row => ({ lat: parseFloat(row.lat), lon: parseFloat(row.lon), ele: parseFloat(row.elevation||0), time: row.time||new Date().toISOString(), csvSpeed: parseFloat(row.speed||0) }));
                        processAllPoints(pts);
                    }});
                } else if(name.endsWith('.gpx')) {
                    const parser = new DOMParser();
                    const pts = parser.parseFromString(evt.target.result,"text/xml").getElementsByTagName('trkpt');
                    let parsedPoints = [];
                    for (let i = 0; i < pts.length; i++) {
                        let lat = parseFloat(pts[i].getAttribute('lat')), lon = parseFloat(pts[i].getAttribute('lon'));
                        let t = pts[i].getElementsByTagName('time')[0], e = pts[i].getElementsByTagName('ele')[0];
                        if (!isNaN(lat) && !isNaN(lon)) parsedPoints.push({ lat: lat, lon: lon, ele: e ? parseFloat(e.textContent) : 0, time: t ? t.textContent : new Date().toISOString(), csvSpeed: 0 });
                    }
                    processAllPoints(parsedPoints);
                }
            };
            r.readAsText(f);
        });

        // --- EXPORT GPX ---
        exportBtn.addEventListener('click', () => {
            if(currentDayPoints.length === 0) return;
            const sel = currentDayPoints.slice(selStartIdx, selEndIdx + 1);
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GPS Editor Pro v1.4.0" xmlns="http://www.topografix.com/GPX/1/1">
  <trk><name>Export_${dateSelect.value}</name><trkseg>
`;
            sel.forEach(p => { gpx += `      <trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele.toFixed(1)}</ele><time>${new Date(p.time).toISOString()}</time></trkpt>
`; });
            gpx += `    </trkseg></trk></gpx>`;
            
            const blob = new Blob([gpx], {type: "application/gpx+xml"});
            const a = document.createElement("a"); 
            a.href = URL.createObjectURL(blob); 
            a.download = `Jogging_${dateSelect.value}.gpx`; 
            a.click();
            URL.revokeObjectURL(a.href);
        });

        // --- EXPORT PNG (SCREENSHOT) ---
        screenshotBtn.addEventListener('click', () => {
            loader.style.display = 'flex';
            document.querySelector('#loader strong').innerText = 'Erstelle Bild...';
            
            // Kurzes Timeout, damit das UI Zeit hat, den Loader anzuzeigen
            setTimeout(() => {
                // Wir fotografieren exakt das Element "#capture-area"
                html2canvas(document.getElementById('capture-area'), {
                    useCORS: true,       // Wichtig für die Karten-Kacheln
                    allowTaint: true,
                    scale: 2,            // Hohe Auflösung
                    backgroundColor: '#f4f4f9'
                }).then(canvas => {
                    let a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    let cleanDate = document.getElementById('stDate').innerText.replace(/./g, '-');
                    a.download = `GPS_Report_${cleanDate}.png`;
                    a.click();
                    
                    loader.style.display = 'none';
                    document.querySelector('#loader strong').innerText = 'Lese GPS-Daten...';
                }).catch(err => {
                    console.error('Screenshot Fehler:', err);
                    alert("Es gab einen Fehler beim Erstellen des Bildes.");
                    loader.style.display = 'none';
                });
            }, 500);
        });
    </script>
</body>
</html>
